<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Mesto</title>
    <link rel="stylesheet" href="./src/pages/index.css" />
  </head>
  <body class="page">
    <div class="page__container">
      <header class="header page__region">
        <img
          src="./src/images/logo.svg"
          alt="Логотип проекта место"
          class="logo header__image"
        />
      </header>
      <main class="main-content">
        <section class="profile page__region">
          <div
            class="profile__avatar"
            style="background-image: url('./src/images/avatar.jpg')"
          ></div>
          <div class="profile__details">
            <h1 class="profile__name">Жак-Ив Кусто</h1>
            <button class="profile__edit-btn" type="button"></button>
            <p class="profile__bio">Исследователь океана</p>
          </div>
          <button class="profile__add-btn" type="button"></button>
        </section>
        <section class="places page__region">
          <ul class="places__grid"></ul>
        </section>
      </main>
      <footer class="footer page__region">
        <p class="footer__text">© 2025 Mesto Russia</p>
      </footer>

      <div class="popup popup_type_edit">
        <div class="popup__container">
          <button type="button" class="popup__close-btn"></button>
          <h3 class="popup__heading">Редактировать профиль</h3>
          <form class="popup__form" name="edit-profile" novalidate>
            <label class="popup__field">
              <input
                type="text"
                name="user-name"
                id="user-name"
                class="popup__input popup__input_type_name"
                placeholder="Имя"
                required
                minlength="2"
                maxlength="40"
                pattern="[A-Za-zА-Яа-яЁё\s\-]+"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              />
              <span class="popup__error" id="user-name-error"></span>
            </label>
            <label class="popup__field">
              <input
                type="text"
                name="user-description"
                id="user-description"
                class="popup__input popup__input_type_description"
                placeholder="Занятие"
                required
                minlength="2"
                maxlength="200"
              />
              <span class="popup__error" id="user-description-error"></span>
            </label>
            <button
              type="submit"
              class="button popup__submit-btn popup__submit-btn_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_new-card">
        <div class="popup__container">
          <button type="button" class="popup__close-btn"></button>
          <h3 class="popup__heading">Новое место</h3>
          <form class="popup__form" name="new-place" novalidate>
            <label class="popup__field">
              <input
                type="text"
                name="place-name"
                id="place-name"
                class="popup__input popup__input_type_card-name"
                placeholder="Название"
                required
                minlength="2"
                maxlength="30"
                pattern="[A-Za-zА-Яа-яЁё\s\-]+"
                data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы"
              />
              <span class="popup__error" id="place-name-error"></span>
            </label>
            <label class="popup__field">
              <input
                type="url"
                name="place-link"
                id="place-link"
                class="popup__input popup__input_type_url"
                placeholder="Ссылка на картинку"
                required
              />
              <span class="popup__error" id="place-link-error"></span>
            </label>
            <button
              type="submit"
              class="button popup__submit-btn popup__submit-btn_disabled"
              disabled
            >
              Создать
            </button>
          </form>
        </div>
      </div>

      <div class="popup popup_type_image">
        <div class="popup__container popup__container_type_image">
          <button type="button" class="popup__close-btn"></button>
          <img src="" alt="" class="popup__image" />
          <p class="popup__caption"></p>
        </div>
      </div>

      <div class="popup popup_type_edit-avatar">
        <div class="popup__container">
          <button type="button" class="popup__close-btn"></button>
          <h3 class="popup__heading">Обновить аватар</h3>
          <form class="popup__form" name="edit-avatar" novalidate>
            <label class="popup__field">
              <input
                type="url"
                name="user-avatar"
                id="user-avatar"
                class="popup__input popup__input_type_avatar"
                placeholder="Ссылка на изображение"
                required
              />
              <span class="popup__error" id="user-avatar-error"></span>
            </label>
            <button
              type="submit"
              class="button popup__submit-btn popup__submit-btn_disabled"
              disabled
            >
              Сохранить
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="./src/scripts/index.js" defer type="module"></script>

    <template id="card-template">
      <li class="places__item card">
        <img class="card__image" src="" alt="" />
        <div class="card__controls">
          <button type="button" class="card__control-btn card__control-btn_type_delete"></button>
        </div>
        <div class="card__info">
          <h2 class="card__title"></h2>
          <div class="card__likes">
            <button type="button" class="card__like-btn"></button>
          </div>
        </div>
      </li>
    </template>
  </body>
</html>
